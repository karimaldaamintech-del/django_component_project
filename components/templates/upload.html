<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Component File</title>
</head>
<body>
    <h2>Upload Component File (Excel or CSV)</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="component_file" accept=".xlsx, .xls, .csv" required>
        <button type="submit">Upload and Process</button>
    </form>
</body>
</html>
